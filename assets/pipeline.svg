<svg width="860" height="420" viewBox="0 0 860 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg       { fill: #0f0f1a; }
      .card     { fill: #1a1a2e; stroke: #2e2e50; stroke-width: 1.5; }
      .text-main  { fill: #e2e2f0; font-family: 'Segoe UI', sans-serif; }
      .text-muted { fill: #7070a0; font-family: 'Segoe UI', sans-serif; }
      .text-hindi { fill: #9b8dff; font-family: 'Segoe UI', sans-serif; }

      .pulse { animation: pulse 2s ease-in-out infinite; }
      @keyframes pulse {
        0%,100% { opacity:1; } 50% { opacity:0.3; }
      }

      .flow { stroke-dasharray:8 4; animation: flow 1.4s linear infinite; }
      @keyframes flow {
        from { stroke-dashoffset:24; } to { stroke-dashoffset:0; }
      }

      .s1 { animation: rise .5s ease  .0s both; }
      .s2 { animation: rise .5s ease  .25s both; }
      .s3 { animation: rise .5s ease  .5s both; }
      .s4 { animation: rise .5s ease  .75s both; }
      .s5 { animation: rise .5s ease 1.0s both; }
      @keyframes rise {
        from { opacity:0; transform:translateY(12px); }
        to   { opacity:1; transform:translateY(0); }
      }

      .spin { animation: spin 1.6s linear infinite; transform-origin:50% 50%; }
      @keyframes spin { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

      .b1{animation:bar .85s ease-in-out 0.00s infinite alternate;}
      .b2{animation:bar .85s ease-in-out 0.12s infinite alternate;}
      .b3{animation:bar .85s ease-in-out 0.24s infinite alternate;}
      .b4{animation:bar .85s ease-in-out 0.36s infinite alternate;}
      .b5{animation:bar .85s ease-in-out 0.48s infinite alternate;}
      .b6{animation:bar .85s ease-in-out 0.60s infinite alternate;}
      @keyframes bar { from{transform:scaleY(.25);} to{transform:scaleY(1);} }

      .glow { animation: glow 2s ease-in-out infinite; }
      @keyframes glow {
        0%,100% { filter:drop-shadow(0 0 3px #7c6af7); }
        50%      { filter:drop-shadow(0 0 10px #7c6af7); }
      }

      .tw { animation: tw 3s steps(20,end) 1.5s both; }
      @keyframes tw { from{clip-path:inset(0 100% 0 0);} to{clip-path:inset(0 0% 0 0);} }
    </style>
    <marker id="a"  markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <path d="M1,1 L6,3.5 L1,6Z" fill="#7c6af7"/>
    </marker>
    <marker id="ag" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <path d="M1,1 L6,3.5 L1,6Z" fill="#4ade80"/>
    </marker>
  </defs>

  <!-- BG -->
  <rect width="860" height="420" rx="14" class="bg"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="860" height="46" rx="14" fill="#1a1a2e"/>
  <rect x="0" y="32" width="860" height="14" fill="#1a1a2e"/>
  <circle cx="26" cy="23" r="5.5" fill="#f87171"/>
  <circle cx="46" cy="23" r="5.5" fill="#fbbf24"/>
  <circle cx="66" cy="23" r="5.5" fill="#4ade80"/>
  <text x="430" y="28" text-anchor="middle" class="text-main" font-size="13" font-weight="700">🎙  YT Dubber — How It Works</text>

  <!-- ══ TOP ROW: Video URL Pipeline ══ -->

  <!-- Card 1: User Input -->
  <g class="s1">
    <rect x="28" y="64" width="136" height="116" rx="10" class="card"/>
    <rect x="28" y="64" width="136" height="4" rx="2" fill="#7c6af7" opacity=".7"/>
    <text x="96" y="84"  text-anchor="middle" class="text-muted" font-size="9" font-weight="600">STEP 1</text>
    <text x="96" y="100" text-anchor="middle" class="text-main"  font-size="13" font-weight="700">Paste URL</text>
    <rect x="38" y="106" width="116" height="20" rx="5" fill="#222240" stroke="#2e2e50" stroke-width="1"/>
    <text x="48" y="120" class="text-muted" font-size="8">youtube.com/watch?v=…</text>
    <rect x="54" y="133" width="84" height="18" rx="5" fill="#7c6af7" class="glow"/>
    <text x="96" y="145" text-anchor="middle" fill="white" font-size="10" font-weight="700">▶ Dub It</text>
    <text x="96" y="174" text-anchor="middle" class="text-muted" font-size="8">pick language + voice</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="166" y1="122" x2="186" y2="122" stroke="#7c6af7" stroke-width="2" marker-end="url(#a)" class="flow"/>

  <!-- Card 2: Captions -->
  <g class="s2">
    <rect x="188" y="64" width="136" height="116" rx="10" class="card"/>
    <rect x="188" y="64" width="136" height="4" rx="2" fill="#fbbf24" opacity=".7"/>
    <text x="256" y="84"  text-anchor="middle" class="text-muted" font-size="9" font-weight="600">STEP 2</text>
    <text x="256" y="100" text-anchor="middle" class="text-main"  font-size="13" font-weight="700">Captions</text>
    <rect x="198" y="106" width="116" height="18" rx="4" fill="#2a2a1a" stroke="#fbbf24" stroke-width="1" opacity=".7"/>
    <text x="256" y="118" text-anchor="middle" fill="#fbbf24" font-size="9">yt-dlp</text>
    <rect x="198" y="130" width="116" height="5" rx="2" fill="#2e2e50"/>
    <rect x="198" y="139" width="86"  height="5" rx="2" fill="#2e2e50"/>
    <rect x="198" y="148" width="100" height="5" rx="2" fill="#2e2e50"/>
    <rect x="270" y="130" width="44" height="14" rx="3" fill="#fbbf24" opacity=".15"/>
    <text x="292" y="140" text-anchor="middle" fill="#fbbf24" font-size="7">auto-detect lang</text>
    <text x="256" y="174" text-anchor="middle" class="text-muted" font-size="8">any language source</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="326" y1="122" x2="346" y2="122" stroke="#7c6af7" stroke-width="2" marker-end="url(#a)" class="flow"/>

  <!-- Card 3: Translation -->
  <g class="s3">
    <rect x="348" y="64" width="136" height="116" rx="10" class="card"/>
    <rect x="348" y="64" width="136" height="4" rx="2" fill="#7c6af7" opacity=".7"/>
    <text x="416" y="84"  text-anchor="middle" class="text-muted" font-size="9" font-weight="600">STEP 3</text>
    <text x="416" y="100" text-anchor="middle" class="text-main"  font-size="13" font-weight="700">Translate</text>
    <rect x="358" y="106" width="116" height="18" rx="4" fill="#1a1a3a" stroke="#7c6af7" stroke-width="1" opacity=".7"/>
    <text x="416" y="118" text-anchor="middle" fill="#9b8dff" font-size="9">Groq llama-3.1-8b</text>
    <!-- Hindi output with typewriter -->
    <rect x="358" y="130" width="116" height="24" rx="4" fill="#16162a" stroke="#2e2e50" stroke-width="1"/>
    <text x="366" y="146" class="text-hindi tw" font-size="11">तो भाई, देखो यार!</text>
    <!-- Spinner -->
    <path d="M484,130 A7,7 0 0,1 491,142" stroke="#7c6af7" stroke-width="2" fill="none" stroke-linecap="round" class="spin"/>
    <text x="416" y="174" text-anchor="middle" class="text-muted" font-size="8">slang dict · URL strip · retry 6×</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="486" y1="122" x2="506" y2="122" stroke="#7c6af7" stroke-width="2" marker-end="url(#a)" class="flow"/>

  <!-- Card 4: TTS -->
  <g class="s4">
    <rect x="508" y="64" width="136" height="116" rx="10" class="card"/>
    <rect x="508" y="64" width="136" height="4" rx="2" fill="#4ade80" opacity=".7"/>
    <text x="576" y="84"  text-anchor="middle" class="text-muted" font-size="9" font-weight="600">STEP 4</text>
    <text x="576" y="100" text-anchor="middle" class="text-main"  font-size="13" font-weight="700">TTS Audio</text>
    <rect x="518" y="106" width="116" height="18" rx="4" fill="#1a2a1a" stroke="#4ade80" stroke-width="1" opacity=".7"/>
    <text x="576" y="118" text-anchor="middle" fill="#4ade80" font-size="9">edge-tts · free</text>
    <!-- Waveform -->
    <g transform="translate(526,132)" style="transform-box:fill-box;">
      <rect x="0"  y="6"  width="7" height="14" rx="3" fill="#4ade80" opacity=".85" class="b1" style="transform-origin:center bottom;"/>
      <rect x="12" y="2"  width="7" height="22" rx="3" fill="#4ade80" opacity=".85" class="b2" style="transform-origin:center bottom;"/>
      <rect x="24" y="8"  width="7" height="10" rx="3" fill="#4ade80" opacity=".85" class="b3" style="transform-origin:center bottom;"/>
      <rect x="36" y="3"  width="7" height="20" rx="3" fill="#4ade80" opacity=".85" class="b4" style="transform-origin:center bottom;"/>
      <rect x="48" y="7"  width="7" height="12" rx="3" fill="#4ade80" opacity=".85" class="b5" style="transform-origin:center bottom;"/>
      <rect x="60" y="1"  width="7" height="24" rx="3" fill="#4ade80" opacity=".85" class="b6" style="transform-origin:center bottom;"/>
      <rect x="72" y="5"  width="7" height="16" rx="3" fill="#4ade80" opacity=".85" class="b1" style="transform-origin:center bottom;"/>
      <rect x="84" y="4"  width="7" height="18" rx="3" fill="#4ade80" opacity=".85" class="b2" style="transform-origin:center bottom;"/>
    </g>
    <text x="576" y="174" text-anchor="middle" class="text-muted" font-size="8">cached · ≤1.4× stretch</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="646" y1="122" x2="666" y2="122" stroke="#4ade80" stroke-width="2" marker-end="url(#ag)" class="flow"/>

  <!-- Card 5: Playback -->
  <g class="s5">
    <rect x="668" y="64" width="164" height="116" rx="10" class="card"/>
    <rect x="668" y="64" width="164" height="4" rx="2" fill="#4ade80" opacity=".7"/>
    <text x="750" y="84"  text-anchor="middle" class="text-muted" font-size="9" font-weight="600">STEP 5</text>
    <text x="750" y="100" text-anchor="middle" class="text-main"  font-size="13" font-weight="700">Sync &amp; Play</text>
    <!-- mpv badge -->
    <rect x="678" y="106" width="72" height="18" rx="4" fill="#1a2a1a" stroke="#4ade80" stroke-width="1" opacity=".7"/>
    <text x="714" y="118" text-anchor="middle" fill="#4ade80" font-size="9">mpv video</text>
    <!-- play icon -->
    <circle cx="740" cy="115" r="10" fill="#7c6af7" opacity=".2" class="pulse"/>
    <polygon points="736,110 736,120 746,115" fill="#9b8dff"/>
    <!-- progress bar -->
    <rect x="678" y="131" width="144" height="5" rx="2" fill="#2e2e50"/>
    <rect x="678" y="131" width="66"  height="5" rx="2" fill="#7c6af7"/>
    <circle cx="744" cy="133" r="4" fill="#9b8dff"/>
    <!-- subtitle line -->
    <rect x="678" y="143" width="144" height="14" rx="3" fill="#1a1a2e" stroke="#7c6af7" stroke-width=".8"/>
    <text x="750" y="153" text-anchor="middle" class="text-hindi" font-size="8">अब बॉस, regular expressions की बारी है!</text>
    <text x="750" y="174" text-anchor="middle" class="text-muted" font-size="8">buffer-sync · auto-pause · IPC</text>
  </g>

  <!-- ── DIVIDER ── -->
  <line x1="28" y1="206" x2="832" y2="206" stroke="#2e2e50" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="430" y="222" text-anchor="middle" class="text-muted" font-size="10" font-weight="600">LIVE DUB MODE — real-time · Linux · ~3s lag</text>

  <!-- ══ BOTTOM ROW: Live Dub Pipeline ══ -->

  <!-- Capture -->
  <g class="s1">
    <rect x="28"  y="232" width="120" height="64" rx="8" class="card"/>
    <rect x="28"  y="232" width="120" height="3" rx="1" fill="#f87171" opacity=".7"/>
    <circle cx="88" cy="252" r="7" fill="#f87171" class="pulse"/>
    <text x="88" y="272" text-anchor="middle" class="text-muted" font-size="9" font-weight="600">CAPTURE</text>
    <text x="88" y="284" text-anchor="middle" class="text-muted" font-size="8">parec · VAD · 16kHz</text>
  </g>
  <line x1="150" y1="264" x2="168" y2="264" stroke="#7c6af7" stroke-width="1.5" marker-end="url(#a)" class="flow"/>

  <!-- Whisper STT -->
  <g class="s2">
    <rect x="170" y="232" width="136" height="64" rx="8" class="card"/>
    <rect x="170" y="232" width="136" height="3" rx="1" fill="#fbbf24" opacity=".7"/>
    <text x="238" y="252" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">WHISPER STT</text>
    <text x="238" y="265" text-anchor="middle" class="text-muted" font-size="8">Groq cloud · auto-detect</text>
    <text x="238" y="278" text-anchor="middle" class="text-muted" font-size="8">timestamped transcript</text>
    <text x="238" y="289" text-anchor="middle" class="text-muted" font-size="8">any source language</text>
  </g>
  <line x1="308" y1="264" x2="326" y2="264" stroke="#7c6af7" stroke-width="1.5" marker-end="url(#a)" class="flow"/>

  <!-- Translate -->
  <g class="s3">
    <rect x="328" y="232" width="136" height="64" rx="8" class="card"/>
    <rect x="328" y="232" width="136" height="3" rx="1" fill="#7c6af7" opacity=".7"/>
    <text x="396" y="252" text-anchor="middle" fill="#9b8dff" font-size="10" font-weight="700">TRANSLATE</text>
    <text x="396" y="265" text-anchor="middle" class="text-muted" font-size="8">Groq llama · casual style</text>
    <text x="396" y="278" text-anchor="middle" class="text-hindi" font-size="9">यार, देखो → Hindi</text>
    <text x="396" y="289" text-anchor="middle" class="text-muted" font-size="8">drop stale &gt;6s</text>
  </g>
  <line x1="466" y1="264" x2="484" y2="264" stroke="#7c6af7" stroke-width="1.5" marker-end="url(#a)" class="flow"/>

  <!-- TTS live -->
  <g class="s4">
    <rect x="486" y="232" width="136" height="64" rx="8" class="card"/>
    <rect x="486" y="232" width="136" height="3" rx="1" fill="#4ade80" opacity=".7"/>
    <text x="554" y="252" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="700">TTS</text>
    <text x="554" y="265" text-anchor="middle" class="text-muted" font-size="8">edge-tts neural voice</text>
    <g transform="translate(514,272)" style="transform-box:fill-box;">
      <rect x="0"  y="4" width="5" height="10" rx="2" fill="#4ade80" opacity=".8" class="b1" style="transform-origin:center bottom;"/>
      <rect x="9"  y="0" width="5" height="16" rx="2" fill="#4ade80" opacity=".8" class="b2" style="transform-origin:center bottom;"/>
      <rect x="18" y="5" width="5" height="8"  rx="2" fill="#4ade80" opacity=".8" class="b3" style="transform-origin:center bottom;"/>
      <rect x="27" y="1" width="5" height="14" rx="2" fill="#4ade80" opacity=".8" class="b4" style="transform-origin:center bottom;"/>
      <rect x="36" y="4" width="5" height="10" rx="2" fill="#4ade80" opacity=".8" class="b5" style="transform-origin:center bottom;"/>
      <rect x="45" y="2" width="5" height="12" rx="2" fill="#4ade80" opacity=".8" class="b6" style="transform-origin:center bottom;"/>
      <rect x="54" y="3" width="5" height="11" rx="2" fill="#4ade80" opacity=".8" class="b1" style="transform-origin:center bottom;"/>
    </g>
  </g>
  <line x1="624" y1="264" x2="642" y2="264" stroke="#4ade80" stroke-width="1.5" marker-end="url(#ag)" class="flow"/>

  <!-- Speakers -->
  <g class="s5">
    <rect x="644" y="232" width="188" height="64" rx="8" class="card"/>
    <rect x="644" y="232" width="188" height="3" rx="1" fill="#4ade80" opacity=".7"/>
    <text x="738" y="252" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="700">SPEAKERS</text>
    <text x="738" y="265" text-anchor="middle" class="text-muted" font-size="8">ffmpeg → pacat → auto-detect sink</text>
    <text x="738" y="278" text-anchor="middle" class="text-muted" font-size="8">dubbed audio through your speakers</text>
    <rect x="664" y="284" width="56" height="10" rx="3" fill="#f87171" opacity=".2"/>
    <text x="692" y="292" text-anchor="middle" fill="#f87171" font-size="8">lag ~3–5s</text>
  </g>

  <!-- ── FOOTER ── -->
  <rect x="0" y="320" width="860" height="100" rx="14" fill="#13131f"/>
  <rect x="0" y="306" width="860" height="14" fill="#13131f"/>

  <!-- Footer items -->
  <rect x="30" y="332" width="10" height="10" rx="2" fill="#7c6af7"/>
  <text x="48" y="341" class="text-muted" font-size="10">Disk cache — 2nd run on same video is instant</text>

  <rect x="30" y="354" width="10" height="10" rx="2" fill="#4ade80"/>
  <text x="48" y="363" class="text-muted" font-size="10">Buffer-sync — mpv auto-pauses if generation falls behind</text>

  <rect x="30" y="376" width="10" height="10" rx="2" fill="#fbbf24"/>
  <text x="48" y="385" class="text-muted" font-size="10">Rate-limit resilient — retries 6× · English fallback</text>

  <rect x="410" y="332" width="10" height="10" rx="2" fill="#9b8dff"/>
  <text x="428" y="341" class="text-muted" font-size="10">20 languages · Male &amp; Female neural voices</text>

  <rect x="410" y="354" width="10" height="10" rx="2" fill="#f87171"/>
  <text x="428" y="363" class="text-muted" font-size="10">Electron + mpv — Chromium never handles video/audio</text>

  <rect x="410" y="376" width="10" height="10" rx="2" fill="#4ade80"/>
  <text x="428" y="385" class="text-muted" font-size="10">GPL-3.0 · github.com/Ashut90/youtube-dubber</text>

</svg>
